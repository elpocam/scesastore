<div class="page-hero-sm">
  <div class="container">
    <h1>Nuestros Productos</h1>
    <p>Tecnologia de seguridad de primer nivel</p>
  </div>
</div>

<div class="section">
  <div class="container">
    <div class="products-view" id="productsListView">
      <div class="products-toolbar">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="filterProducts()" />
        </div>
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" onclick="setFilter('Todos', this)">Todos</button>
          <button class="filter-tab" onclick="setFilter('Camaras', this)">Camaras</button>
          <button class="filter-tab" onclick="setFilter('Routers', this)">Routers</button>
          <button class="filter-tab" onclick="setFilter('NVR', this)">NVR/DVR</button>
          <button class="filter-tab" onclick="setFilter('Alarmas', this)">Alarmas</button>
          <button class="filter-tab" onclick="setFilter('Control', this)">Control</button>
          <button class="filter-tab" onclick="setFilter('Accesorios', this)">Accesorios</button>
        </div>
        <div class="sort-box">
          <select id="sortSelect" onchange="filterProducts()">
            <option value="default">Ordenar</option>
            <option value="price-asc">Precio: Menor</option>
            <option value="price-desc">Precio: Mayor</option>
            <option value="name">Nombre A-Z</option>
          </select>
        </div>
      </div>
      <div class="products-grid" id="productsGrid"></div>
      <div class="no-results" id="noResults" style="display:none">
        <i class="fas fa-box-open"></i>
        <p>No se encontraron productos</p>
      </div>
    </div>
    <div class="product-detail-view" id="productDetailView" style="display:none"></div>
  </div>
</div>
